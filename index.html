<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Firstfruit — Budget Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2EDE3;--surface:#FFFFFF;--surface2:#F7F3EB;--border:#DDD5C0;
  --sage:#5A9A4A;--sage-bg:#EDF5E9;--sage-dark:#1E3A1E;--sage-mid:#6AAA58;
  --gold:#C87830;--gold-bg:#F5ECD8;--charcoal:#1C1C1A;--body:#302E28;
  --muted:#7A7060;--warn:#B85C3A;--red:#8B2020;
  --blue:#2E6DA4;--blue-bg:#E8F2FA;
  --purple:#6B4FA0;--purple-bg:#F0EBF8;
  --r:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--body);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-tap-highlight-color:transparent;}
input,select,textarea,button{font-family:inherit;font-size:inherit;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}

/* TOP BAR — warm, no harsh line */
.top-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 16px 0;position:sticky;top:0;z-index:100;flex-shrink:0;}
.top-row{display:flex;align-items:center;gap:10px;padding-bottom:8px;}
.top-bar h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--sage-dark);flex:1;}
.month-pick{border:1px solid var(--border);background:var(--surface);color:var(--body);border-radius:8px;padding:4px 8px;font-size:13px;}
.sync-btn{background:var(--sage);color:#fff;border:none;border-radius:8px;padding:5px 14px;font-size:13px;font-weight:500;cursor:pointer;}

/* SUMMARY BAR — sticky, 3 across */
.sum-bar{display:flex;gap:6px;padding:0 0 10px;background:var(--surface2);}
.sb-item{flex:1;background:var(--surface);border-radius:10px;padding:7px 6px;text-align:center;border:1px solid var(--border);}
.sb-lbl{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.sb-val{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--charcoal);}
.sb-val.pos{color:var(--sage);}
.sb-val.neg{color:var(--red);}

/* PAGES */
.pages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:12px 12px 80px;}
.page.active{display:block;}

/* BOTTOM NAV — always sticky */
.bot-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;position:sticky;bottom:0;z-index:100;flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 10px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;}
.nav-btn.active{color:var(--sage);}
.nav-btn svg{width:20px;height:20px;}

/* VERSE */
.verse-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px;}
.verse-date{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.verse-text{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--charcoal);line-height:1.5;margin-bottom:4px;}
.verse-ref{font-size:12px;color:var(--sage);font-weight:500;}

/* COH */
.coh-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px;}
.coh-card h3{font-size:13px;font-weight:600;color:var(--charcoal);margin-bottom:8px;}
.coh-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;}
.coh-lbl{font-size:13px;color:var(--muted);}
.coh-amt{font-size:14px;font-weight:600;color:var(--charcoal);}
.coh-amt.pos{color:var(--sage);}
.coh-amt.neg{color:var(--red);}
.coh-divider{border:none;border-top:1px solid var(--border);margin:6px 0;}

/* SECTION CARD */
.sec-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.sec-hdr{display:flex;align-items:center;padding:12px 14px 10px;gap:8px;cursor:pointer;user-select:none;}
.sec-hdr h2{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;flex:1;color:var(--charcoal);}
.sec-arrow{font-size:14px;color:var(--muted);transition:transform .2s;}
.sec-card.collapsed .sec-arrow{transform:rotate(-90deg);}
.sec-card.collapsed .sec-body{display:none;}
.sec-income{border-left:3px solid var(--blue);}
.sec-income .sec-hdr{background:var(--blue-bg);}
.sec-income .sec-hdr h2{color:var(--blue);}
.sec-tithe{border-left:3px solid var(--purple);}
.sec-tithe .sec-hdr{background:var(--purple-bg);}
.sec-tithe .sec-hdr h2{color:var(--purple);}

/* TABLE */
.bt{width:100%;border-collapse:collapse;}
.bt th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:5px 6px;background:var(--surface2);border-bottom:1px solid var(--border);text-align:right;}
.bt th:first-child{text-align:left;}
.bt td{padding:6px 6px;border-bottom:1px solid var(--border);vertical-align:middle;}
.bt tr:last-child td{border-bottom:none;}
.bt .tot td{background:var(--surface2);font-weight:600;}

/* LABEL CELL */
.lc{display:flex;align-items:center;gap:3px;}
.lbl-in{border:none;background:transparent;color:var(--body);font-size:13px;font-weight:500;width:100%;min-width:50px;padding:0;outline:none;}
.lbl-in:focus{background:var(--surface2);border-radius:4px;padding:0 3px;}
.rm-btn{background:none;border:none;color:var(--muted);font-size:15px;line-height:1;cursor:pointer;padding:0;flex-shrink:0;}
.ic-btn{background:none;border:none;font-size:12px;line-height:1;cursor:pointer;padding:0 1px;flex-shrink:0;color:var(--muted);}
.move-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0 1px;flex-shrink:0;line-height:1;}

/* NUMBER INPUTS */
.ni{border:1px solid transparent;background:transparent;color:var(--charcoal);font-size:13px;font-weight:500;text-align:right;width:64px;padding:2px 4px;border-radius:6px;outline:none;-webkit-appearance:none;appearance:none;display:block;margin-left:auto;}
.ni:focus{border-color:var(--border);background:var(--surface2);}
.ni.g{color:var(--sage);}
.ni.r{color:var(--red);}
.disp{font-size:13px;font-weight:500;text-align:right;display:block;}
.disp.g{color:var(--sage);}
.disp.r{color:var(--red);}

/* RECUR BADGE */
.recur-badge{font-size:10px;font-weight:600;color:var(--sage);background:var(--sage-bg);border-radius:4px;padding:1px 5px;white-space:nowrap;cursor:pointer;border:none;flex-shrink:0;}

/* DATE PICKER */
.date-picker-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dom-in{border:1px solid var(--border);background:var(--surface);color:var(--body);border-radius:6px;padding:3px 6px;font-size:12px;width:52px;text-align:center;-webkit-appearance:none;appearance:none;}
.dow-label{font-size:11px;color:var(--sage);font-weight:600;background:var(--sage-bg);border-radius:4px;padding:2px 6px;}

/* NOTE ROW */
.note-row td{padding:2px 8px 8px;}
.note-in{width:100%;border:1px solid var(--border);background:var(--surface2);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--body);resize:none;outline:none;}

/* RECUR ROW */
.recur-row td{padding:4px 8px 10px;background:var(--surface2);}
.recur-inner{display:flex;flex-wrap:wrap;align-items:center;gap:6px;}
.recur-freq-sel{border:1px solid var(--border);background:var(--surface);color:var(--body);border-radius:6px;padding:4px 6px;font-size:12px;}
.day-btns{display:flex;gap:3px;flex-wrap:wrap;}
.day-btn{border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:5px;padding:3px 5px;font-size:11px;font-weight:500;cursor:pointer;line-height:1.3;}
.day-btn.on{background:var(--sage);color:#fff;border-color:var(--sage);}

/* ADD BTN */
.add-btn{width:100%;padding:10px;background:none;border:none;color:var(--sage);font-size:13px;font-weight:500;cursor:pointer;text-align:center;}

/* SUBS */
.subs-row td{background:var(--sage-bg);padding:4px 8px 4px 20px;}
.sub-lbl{font-size:12px;color:var(--muted);min-width:80px;}

/* TITHE */
.tithe-body{padding:14px 16px;}
.tithe-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.tc{background:var(--purple-bg);border-radius:10px;padding:10px 8px;text-align:center;}
.tc .tc-lbl{font-size:10px;color:var(--purple);font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-bottom:4px;}
.tc .tc-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--charcoal);}
.tc .tc-val.warn{color:var(--warn);}
.tithe-given{border:1px solid var(--purple);background:var(--surface);color:var(--charcoal);border-radius:8px;padding:5px 8px;font-size:15px;font-weight:600;text-align:center;width:100%;outline:none;margin-top:4px;-webkit-appearance:none;appearance:none;}
.tithe-note{background:var(--purple-bg);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--purple);text-align:center;margin-top:8px;}

/* CASH FLOW */
.cf-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.cf-w{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:12px 10px;text-align:center;}
.cf-w .cw-lbl{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
.cf-w .cw-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;}
.cf-w .cw-val.pos{color:var(--sage);}
.cf-w .cw-val.neg{color:var(--red);}
.chart-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 12px;margin-bottom:12px;}
.chart-card h3{font-size:13px;font-weight:600;color:var(--charcoal);margin-bottom:10px;}
#cfCanvas{display:block;width:100%;}
.wk-pills{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.wk-pill{border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.wk-pill.pos{background:var(--sage-bg);}
.wk-pill.neg{background:#FDF0EE;}
.wk-pill .wp-lbl{font-size:12px;color:var(--muted);font-weight:500;}
.wk-pill .wp-val{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;}
.wk-pill.pos .wp-val{color:var(--sage);}
.wk-pill.neg .wp-val{color:var(--red);}

/* BANKS */
.bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.bank-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px;}
.bank-card .bk-name{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.bank-card .bk-wrap{display:flex;align-items:baseline;gap:2px;}
.bank-card .bk-sym{color:var(--muted);font-size:14px;}
.bank-card .bk-in{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--charcoal);border:none;background:transparent;width:100%;outline:none;-webkit-appearance:none;appearance:none;}
.bills-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;}
.bills-card h3{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;margin-bottom:10px;color:var(--charcoal);}
.bill-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.bill-row:last-child{border-bottom:none;}
.bill-name{font-size:13px;font-weight:500;}
.bill-right{display:flex;align-items:center;gap:6px;}
.bill-date{font-size:11px;color:var(--muted);}
.bill-badge{border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;}
.badge-koho{background:var(--sage-bg);color:var(--sage);}
.badge-square{background:var(--gold-bg);color:var(--gold);}

/* NOTES */
.notes-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px;}
.notes-card h3{font-size:13px;font-weight:600;color:var(--charcoal);margin-bottom:8px;}
.notes-ta{width:100%;border:1px solid var(--border);background:var(--surface2);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--body);resize:none;outline:none;min-height:120px;line-height:1.5;}

/* SETTINGS */
.set-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;margin-bottom:12px;}
.set-card h3{font-size:13px;font-weight:600;color:var(--charcoal);margin-bottom:8px;}
.set-in{width:100%;border:1px solid var(--border);background:var(--surface2);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--body);outline:none;margin-bottom:8px;}
.code-pre{background:var(--charcoal);color:#A8D8A8;border-radius:10px;padding:12px;font-size:11px;font-family:monospace;overflow-x:auto;white-space:pre;max-height:180px;overflow-y:auto;}
.btn-p{background:var(--sage);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:4px;}
.btn-s{background:var(--surface2);color:var(--body);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;width:100%;margin-bottom:6px;}

/* DRILL DOWN */
.drill-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;margin-top:12px;}
.drill-card h3{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--charcoal);}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="top-row">
      <h1>Firstfruit</h1>
      <select class="month-pick" id="monthPick" onchange="onMonthChange(this.value)"></select>
      <button class="sync-btn" onclick="doSync()">Sync</button>
    </div>
    <div class="sum-bar" id="sumBar"></div>
  </div>
  <div class="pages">
    <div class="page active" id="page-budget">
      <div class="verse-card"><div class="verse-date" id="vDate"></div><div class="verse-text" id="vText"></div><div class="verse-ref" id="vRef"></div></div>
      <div class="coh-card" id="cohCard"></div>
      <div id="zIncome"></div>
      <div id="zTithe"></div>
      <div id="zSavings"></div>
      <div id="zHousing"></div>
      <div id="zFood"></div>
      <div id="zPersonal"></div>
      <div id="zLifestyle"></div>
      <div id="zHealth"></div>
      <div id="zAquifer"></div>
      <div id="zDebts"></div>
    </div>
    <div class="page" id="page-flow">
      <div class="cf-top" id="cfTop"></div>
      <div class="chart-card">
        <h3>Weekly Cash Flow</h3>
        <canvas id="cfCanvas"></canvas>
        <div class="wk-pills" id="wkPills"></div>
      </div>
      <div id="wkDrill" style="display:none;" class="drill-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <h3 id="wkDrillTitle"></h3>
          <button onclick="closeWkDrill()" style="background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;">&#10005;</button>
        </div>
        <div id="wkDrillBody"></div>
      </div>
    </div>
    <div class="page" id="page-banks">
      <div class="bank-grid" id="bankGrid"></div>
      <div class="bills-card" id="billsCard"></div>
    </div>
    <div class="page" id="page-notes">
      <div class="notes-card"><h3>Monthly Notes</h3><textarea class="notes-ta" id="globalNotes" rows="6" placeholder="Notes for this month..." oninput="onNotesInput()"></textarea></div>
    </div>
    <div class="page" id="page-settings">
      <div class="set-card"><h3>Apps Script URL</h3><input class="set-in" id="asUrl" type="url" placeholder="https://script.google.com/macros/s/..." oninput="onUrlInput()"><button class="btn-p" onclick="doSync()">Sync Now</button></div>
      <div class="set-card"><h3>Apps Script Code</h3><pre class="code-pre" id="codePre"></pre><button class="btn-s" onclick="doCopyCode()" style="margin-top:8px;">Copy Code</button></div>
      <div class="set-card"><h3>Data</h3><button class="btn-s" onclick="doExport()">Export Backup JSON</button><button class="btn-s" onclick="doImport()">Import Backup JSON</button></div>
    </div>
  </div>
  <nav class="bot-nav">
    <button class="nav-btn active" id="nav-budget" onclick="showPage('budget')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>Budget
    </button>
    <button class="nav-btn" id="nav-flow" onclick="showPage('flow')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Flow
    </button>
    <button class="nav-btn" id="nav-banks" onclick="showPage('banks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg>Banks
    </button>
    <button class="nav-btn" id="nav-notes" onclick="showPage('notes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Notes
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showPage('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings
    </button>
  </nav>
</div>
<script>
var LS = 'firstfruit_budget';
var DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var FREQS = {once:'Once',daily:'Daily',weekly:'Weekly',biweekly:'Every 2 Wks',monthly:'Monthly'};
var VERSES = [

  {t:"The rich rule over the poor, and the borrower is slave to the lender.",r:"Proverbs 22:7"},
  {t:"Be content with what you have, because God has said, I will never leave you.",r:"Hebrews 13:5"},
  {t:"Do not store up treasures on earth, but store up treasures in heaven.",r:"Matthew 6:19-20"},
  {t:"Whoever sows generously will also reap generously.",r:"2 Corinthians 9:6"},
  {t:"I can do all this through him who gives me strength.",r:"Philippians 4:13"},

function dollars(n) {
  var v = parseFloat(n) || 0;
  var abs = Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return (v < 0 ? '-' : '') + '$' + abs;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function parseMonthStr(s) {
  var p = s.split(' ');
  return { y: parseInt(p[1]), m: MONTHS_LONG.indexOf(p[0]) };
}
function finalWed(y, m) {
  var d = new Date(y, m+1, 0);
  while (d.getDay() !== 3) d.setDate(d.getDate()-1);
  return d.getDate();
}
function dowName(y, m, day) {
  return DAYS_FULL[new Date(y, m, day).getDay()];
}

function occurrences(recur, y, m) {
  var r = recur || { freq:'monthly', days:[], dom:1 };
  var f = r.freq || 'monthly';
  var dim = new Date(y, m+1, 0).getDate();
  var out = [];
  if (f === 'once' || f === 'monthly') {
    var d = parseInt(r.dom) || 1;
    if (d <= dim) out.push(d);
    return out;
  }
  if (f === 'daily') { for (var i=1;i<=dim;i++) out.push(i); return out; }
  if (f === 'weekly' || f === 'biweekly') {
    var tds = r.days && r.days.length ? r.days : [];
    var selWks = (f === 'biweekly' && r.weeks && r.weeks.length) ? r.weeks : null;
    tds.forEach(function(td) {
      var diff = (td - new Date(y,m,1).getDay() + 7) % 7;
      var day = 1+diff, wk = 0;
      while (day <= dim) {
        var inc = f==='weekly' ? true : (selWks ? selWks.indexOf(wk)>=0 : wk%2===0);
        if (inc) out.push(day);
        day+=7; wk++;
      }
    });
    out.sort(function(a,b){return a-b;});
    return out;
  }
  return out;
}

function recurLabel(rec) {
  var r = rec || { freq:'monthly', days:[], dom:1 };
  var f = r.freq || 'monthly';
  if (f === 'daily') return 'Daily';
  if (f === 'once') return 'Once';
  if (f === 'monthly') return 'Mo/' + (r.dom||1);
  var ds = (r.days||[]).map(function(i){return DAYS[i];}).join('');
  return (f==='biweekly'?'Bi/':'Wk/') + (ds||'?');
}

// ── TOTALS ────────────────────────────────────────────────────────────────────
function totalPlannedInc() {
  var b = budget(); if (!b) return 0;
  return (b.income||[]).reduce(function(s,r){return s+(parseFloat(r.planned)||0);},0);
}
function totalReceivedInc() {
  var b = budget(); if (!b) return 0;
  return (b.income||[]).reduce(function(s,r){return s+(parseFloat(r.received)||0);},0);
}
function allExpRows() {
  var b = budget(); if (!b) return [];
  var out = [];
  ['housing','food','personal','lifestyle','health','aquifer'].forEach(function(k){
    (b.expenses[k]||[]).forEach(function(r){out.push(r);});
  });
  return out;
}
function totalPlannedExp() {
  var b = budget(); if (!b) return 0;
  var t = allExpRows().reduce(function(s,r){return s+(parseFloat(r.planned)||0);},0);
  t += parseFloat((b.tithe||{}).planned)||0;
  return t;
}
function totalSpentExp() {
  var b = budget(); if (!b) return 0;
  var t = allExpRows().reduce(function(s,r){return s+(parseFloat(r.spent)||0);},0);
  t += parseFloat((b.tithe||{}).given)||0;
  return t;
}

  if (sec==='savings') return (b.savings||[]).find(function(r){return r.id===id;});

// ── ADD / REMOVE / MOVE ───────────────────────────────────────────────────────
function addRow(sec) {
  var b = budget();
  var base = {id:uid(),label:'New Item',planned:0,note:'',recur:{freq:'monthly',days:[],dom:1}};
  if (sec==='income') { base.received=0; b.income.push(base); }
  else if (sec==='savings') { base.contributed=0; b.savings.push(base); }
  else { base.spent=0; if (!b.expenses[sec]) b.expenses[sec]=[]; b.expenses[sec].push(base); }
  save(); renderAll();
}
function removeRow(sec, id) {
  var b = budget();
  if (sec==='income') b.income=b.income.filter(function(r){return r.id!==id;});
  else if (sec==='savings') b.savings=b.savings.filter(function(r){return r.id!==id;});
  else if (b.expenses[sec]) b.expenses[sec]=b.expenses[sec].filter(function(r){return r.id!==id;});
  save(); renderAll();
}
function moveRow(sec, id, dir) {
  var b = budget();
  var arr = sec==='income'?b.income:sec==='savings'?b.savings:(b.expenses[sec]||[]);
  var idx = arr.findIndex(function(r){return r.id===id;});
  if (idx<0) return;
  var newIdx = idx+dir;
  if (newIdx<0||newIdx>=arr.length) return;
  var tmp = arr[idx]; arr[idx]=arr[newIdx]; arr[newIdx]=tmp;
  save(); renderAll();
}
function addDebt() {
  budget().debts.push({id:uid(),label:'New Debt',balance:0,minimum:0,extra:0});
  save(); renderDebts();
}
function removeDebt(id) {
  var b=budget(); b.debts=b.debts.filter(function(r){return r.id!==id;});
  save(); renderDebts();
}

  var dayHtml = '';

// ── CASH FLOW ─────────────────────────────────────────────────────────────────
function renderFlow() {
  var b=budget(); if (!b) return;
  var pm=parseMonthStr(currentMonth);
  var y=pm.y,m=pm.m;
  var dim=new Date(y,m+1,0).getDate();
  var dIn=new Array(dim+1).fill(0);
  var dOut=new Array(dim+1).fill(0);
  (b.income||[]).forEach(function(r){
    var occ=occurrences(r.recur,y,m);
    var cnt=occ.length||1;
    var amt=(parseFloat(r.planned)||0)/cnt;
    occ.forEach(function(d){dIn[d]+=amt;});
  });
  var titheAmt = parseFloat((b.tithe||{}).planned)||0;
  if (titheAmt>0) dOut[1]+=titheAmt;
  ['housing','food','personal','lifestyle','health','aquifer'].forEach(function(k){
    (b.expenses[k]||[]).forEach(function(r){
      var occ=occurrences(r.recur,y,m);
      var cnt=occ.length||1;
      var amt=(parseFloat(r.planned)||0)/cnt;
      occ.forEach(function(d){dOut[d]+=amt;});
    });
  });
  var wkIn=[0],wkOut=[0],wkLbl=['Wk 1'],cur=0;
  for (var d=1;d<=dim;d++) {
    if (new Date(y,m,d).getDay()===1&&d>1){cur++;wkIn[cur]=0;wkOut[cur]=0;wkLbl[cur]='Wk '+(cur+1);}
    wkIn[cur]+=dIn[d];wkOut[cur]+=dOut[d];
  }
  var nw=cur+1;
  var ti=totalPlannedInc(),to=totalPlannedExp(),net=ti-to;
  document.getElementById('cfTop').innerHTML=
    '<div class="cf-w"><div class="cw-lbl">In</div><div class="cw-val pos">'+dollars(ti)+'</div></div>'+
    '<div class="cf-w"><div class="cw-lbl">Out</div><div class="cw-val neg">'+dollars(to)+'</div></div>'+
    '<div class="cf-w"><div class="cw-lbl">Net</div><div class="cw-val '+(net>=0?'pos':'neg')+'">'+dollars(net)+'</div></div>';
  var canvas=document.getElementById('cfCanvas');
  var W=canvas.parentElement.clientWidth-28;
  var H=280;
  canvas.width=W*(window.devicePixelRatio||1);
  canvas.height=H*(window.devicePixelRatio||1);
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio||1,window.devicePixelRatio||1);
  ctx.clearRect(0,0,W,H);
  var maxV=0;
  for (var i=0;i<nw;i++) maxV=Math.max(maxV,wkIn[i],wkOut[i]);
  maxV=maxV*1.2||100;
  var pL=10,pR=10,pT=30,pB=32;
  var cW=W-pL-pR,cH=H-pT-pB;
  var gW=cW/nw;
  var bW=Math.min(gW*0.42,36);
  for (var i=0;i<nw;i++) {
    var x=pL+i*gW;
    var iH=(wkIn[i]/maxV)*cH;
    var oH=(wkOut[i]/maxV)*cH;
    var iX=x+gW/2-bW-2;
    var oX=x+gW/2+2;
    ctx.fillStyle='#5A9A4A';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(iX,pT+cH-iH,bW,iH,[4,4,0,0]); else ctx.rect(iX,pT+cH-iH,bW,iH);
    ctx.fill();
    ctx.fillStyle='#C87830';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(oX,pT+cH-oH,bW,oH,[4,4,0,0]); else ctx.rect(oX,pT+cH-oH,bW,oH);
    ctx.fill();
    ctx.textAlign='center';
    if (wkIn[i]>0){ctx.fillStyle='#5A9A4A';ctx.font='bold 11px DM Sans,sans-serif';ctx.fillText('$'+Math.round(wkIn[i]),iX+bW/2,pT+cH-iH-5);}
    if (wkOut[i]>0){ctx.fillStyle='#C87830';ctx.font='bold 11px DM Sans,sans-serif';ctx.fillText('$'+Math.round(wkOut[i]),oX+bW/2,pT+cH-oH-5);}
    ctx.fillStyle='#7A7060';ctx.font='12px DM Sans,sans-serif';
    ctx.fillText(wkLbl[i],x+gW/2,H-8);
  }
  ctx.strokeStyle='#DDD5C0';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(pL,pT+cH);ctx.lineTo(pL+cW,pT+cH);ctx.stroke();
  ctx.setLineDash([]);
  var pills='';
  for (var i=0;i<nw;i++){
    var wn=wkIn[i]-wkOut[i];
    pills+='<div class="wk-pill '+(wn>=0?'pos':'neg')+'" onclick="openWkDrill('+i+')"><span class="wp-lbl">'+wkLbl[i]+' &#9654;</span><span class="wp-val">'+(wn>=0?'+':'')+'$'+Math.abs(Math.round(wn))+'</span></div>';
  }
  document.getElementById('wkPills').innerHTML=pills;
  window._cfWkData={wkIn:wkIn,wkOut:wkOut,wkLbl:wkLbl,nw:nw,dIn:dIn,dOut:dOut,y:y,m:m};
}

function openWkDrill(wkIdx) {
  var cd=window._cfWkData; if (!cd) return;
  document.getElementById('wkDrillTitle').textContent=cd.wkLbl[wkIdx]+' Detail';
  var days=[],dim=new Date(cd.y,cd.m+1,0).getDate(),cur=0;
  for (var dd=1;dd<=dim;dd++){
    if (new Date(cd.y,cd.m,dd).getDay()===1&&dd>1) cur++;
    if (cur===wkIdx) days.push(dd);
    if (cur>wkIdx) break;
  }
  var h='<table style="width:100%;border-collapse:collapse;">';
  h+='<thead><tr><th style="text-align:left;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;padding:4px 6px;background:var(--surface2);">Day</th>';

  h+='<th style="text-align:right;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;padding:4px 6px;background:var(--surface2);">Out</th>';
  h+='<th style="text-align:right;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;padding:4px 6px;background:var(--surface2);">Net</th></tr></thead><tbody>';
  var totIn=0,totOut=0;
  days.forEach(function(day){
    var din=cd.dIn[day]||0,dout=cd.dOut[day]||0,net=din-dout;
    var nc=net>=0?'var(--sage)':'var(--red)';
    var dow=new Date(cd.y,cd.m,day).getDay();
    totIn+=din;totOut+=dout;
    h+='<tr style="border-bottom:1px solid var(--border);">';
    h+='<td style="padding:7px 6px;font-size:13px;font-weight:500;">'+DAYS_FULL[dow]+' '+day+'</td>';
    h+='<td style="padding:7px 6px;text-align:right;font-size:13px;color:var(--sage);font-weight:500;">'+(din>0?dollars(din):'\u2014')+'</td>';
    h+='<td style="padding:7px 6px;text-align:right;font-size:13px;color:var(--warn);font-weight:500;">'+(dout>0?dollars(dout):'\u2014')+'</td>';
    h+='<td style="padding:7px 6px;text-align:right;font-size:13px;font-weight:600;color:'+nc+';">'+(net>=0?'+':'')+dollars(net)+'</td></tr>';
  });
  var tn=totIn-totOut;
  h+='<tr style="background:var(--surface2);font-weight:600;"><td style="padding:7px 6px;font-size:13px;">Total</td>';
  h+='<td style="padding:7px 6px;text-align:right;font-size:13px;color:var(--sage);">'+dollars(totIn)+'</td>';
  h+='<td style="padding:7px 6px;text-align:right;font-size:13px;color:var(--warn);">'+dollars(totOut)+'</td>';
  h+='<td style="padding:7px 6px;text-align:right;font-size:13px;color:'+(tn>=0?'var(--sage)':'var(--red)')+';">'+(tn>=0?'+':'')+dollars(tn)+'</td></tr>';
  h+='</tbody></table>';
  document.getElementById('wkDrillBody').innerHTML=h;
  document.getElementById('wkDrill').style.display='block';
  setTimeout(function(){document.getElementById('wkDrill').scrollIntoView({behavior:'smooth',block:'start'});},50);
}

    gh+='<input class="bk-in" type="number" inputmode="decimal" value="'+num(bk[def.k]||0)+'" onclick="clearZero(this)" onfocus="clearZero(this)" onchange="setBankBal(\''+def.k+'\',this.value)">';
    gh+='</div></div>';
  });
  document.getElementById('bankGrid').innerHTML=gh;
  var pm=parseMonthStr(currentMonth);
  var fw=finalWed(pm.y,pm.m);
  document.getElementById('billsCard').innerHTML=
    '<h3>Fixed Bills</h3>'+
    '<div class="bill-row"><span class="bill-name">Rent</span><div class="bill-right"><span class="bill-date">Final Wed ('+fw+'th)</span><span class="bill-badge badge-koho">Koho</span></div></div>'+
    '<div class="bill-row"><span class="bill-name">Phone</span><div class="bill-right"><span class="bill-date">24th &mdash; '+dowName(pm.y,pm.m,24)+'</span><span class="bill-badge badge-koho">Koho</span></div></div>'+
    '<div class="bill-row"><span class="bill-name">Claude AI</span><div class="bill-right"><span class="bill-date">4th &mdash; '+dowName(pm.y,pm.m,4)+'</span><span class="bill-badge badge-koho">Koho</span></div></div>'+
    '<div class="bill-row"><span class="bill-name">Storage Fees</span><div class="bill-right"><span class="bill-date">29th &mdash; '+dowName(pm.y,pm.m,29)+'</span><span class="bill-badge badge-koho">Koho</span></div></div>'+
    '<div class="bill-row"><span class="bill-name">Modo</span><div class="bill-right"><span class="bill-date">Every Tuesday</span><span class="bill-badge badge-square">Square</span></div></div>';
}

// ── NOTES ─────────────────────────────────────────────────────────────────────
function renderNotes(){var b=budget();if(!b)return;document.getElementById('globalNotes').value=b.notes||'';}
function onNotesInput(){budget().notes=document.getElementById('globalNotes').value;save();}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function renderSettings(){document.getElementById('asUrl').value=state.settings.url||'';document.getElementById('codePre').textContent=AS_CODE;}
function onUrlInput(){state.settings.url=document.getElementById('asUrl').value;save();}
function doCopyCode(){navigator.clipboard.writeText(AS_CODE).then(function(){alert('Code copied!');});}
function doExport(){
  var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='firstfruit-backup.json';a.click();
}
function doImport(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var fr=new FileReader();
    fr.onload=function(ev){
      try{var p=JSON.parse(ev.target.result);if(p.budgets)state.budgets=p.budgets;if(p.settings)state.settings=p.settings;save();renderAll();alert('Imported.');}
      catch(err){alert('Invalid file.');}
    };
    fr.readAsText(e.target.files[0]);
  };
  inp.click();
}

// ── SYNC ──────────────────────────────────────────────────────────────────────
function doSync(){
  if(!state.settings.url){alert('Set your Apps Script URL in Settings first.');return;}
  var rows=[];
  var b=budget();
  (b.income||[]).forEach(function(r){rows.push(['Income',r.label,r.planned,r.received,'',r.note,'','']);});
  allExpRows().forEach(function(r){rows.push(['Expense',r.label,r.planned,r.spent,'',r.note,'','']);});
  fetch(state.settings.url,{method:'POST',body:JSON.stringify({action:'budget_save',month:currentMonth,rows:rows})})
    .then(function(res){return res.json();})
    .then(function(d){alert(d.ok?'Synced!':'Error: '+d.error);})
    .catch(function(e){alert('Sync failed: '+e);});
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll(){
  renderSumBar();renderCOH();renderIncome();renderTithe();renderSavings();
  renderExpSec('housing','Housing','zHousing');
  renderExpSec('food','Food','zFood');
  renderExpSec('personal','Personal','zPersonal');
  renderExpSec('lifestyle','Lifestyle','zLifestyle');
  renderExpSec('health','Health','zHealth');
  renderExpSec('aquifer','Aquifer Springs','zAquifer');
  renderDebts();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init(){
  try{
    var raw=localStorage.getItem('firstfruit_budget');
    if(raw){var p=JSON.parse(raw);if(p.budgets)state.budgets=p.budgets;if(p.settings)state.settings=p.settings;}
  }catch(e){}
  initMonthPicker();
  if(!state.budgets[currentMonth])state.budgets[currentMonth]=makeBudget(currentMonth);
  renderVerse();renderAll();
  document.getElementById('codePre').textContent=AS_CODE;
})();
</script>
